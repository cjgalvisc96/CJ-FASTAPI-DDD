name: CD (infra)

# Terragrunt init + plan, Trivy IaC scan, and Infracost estimate for the
# serverless AWS stack — all via the shared Taskfile targets. The apply/deploy
# step is intentionally skipped for now.

on:
  push:
    branches: [main]
    paths: ["infra/**", ".github/workflows/cd.yml"]
  pull_request:
    paths: ["infra/**", ".github/workflows/cd.yml"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  ENV: ${{ github.event.inputs.environment || 'dev' }}
  TF_VERSION: "1.9.8"
  TG_VERSION: "1.0.7"
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  trivy:
    name: Trivy IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/setup-trivy@v0.3.1
      - uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - run: task terragrunt:trivy

  plan:
    name: Terragrunt init + plan (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
      - uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - name: Configure AWS credentials (OIDC)
        if: vars.AWS_DEPLOY_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: terragrunt init + plan
        if: vars.AWS_DEPLOY_ROLE_ARN != ''
        run: |
          task terragrunt:init ENV=${{ env.ENV }}
          task terragrunt:plan ENV=${{ env.ENV }}
      - name: Skipped (no AWS role configured)
        if: vars.AWS_DEPLOY_ROLE_ARN == ''
        run: echo "Set the AWS_DEPLOY_ROLE_ARN repo variable to enable terragrunt plan."

  infracost:
    name: Infracost estimate
    runs-on: ubuntu-latest
    needs: trivy
    if: false # DISABLED for now — re-enable when INFRACOST_API_KEY is configured
    steps:
      - uses: actions/checkout@v5
      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - run: task terragrunt:infracost ENV=${{ env.ENV }}

  deploy:
    name: Terragrunt apply (deploy)
    runs-on: ubuntu-latest
    needs: [plan]
    if: false # DEPLOY DISABLED — flip to a manual/environment-gated condition when ready
    steps:
      - uses: actions/checkout@v5
      - uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - run: task terragrunt:apply ENV=${{ env.ENV }}
