name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"

jobs:
  quality:
    name: Lint · Types · Architecture · SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # Per-job suffix: quality/test run in parallel and would otherwise race to save the same
          # cache key ("Unable to reserve cache…" warnings).
          cache-suffix: quality
      - name: Install go-task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - run: uv sync
      - name: Quality gates (ruff + pyright + import-linter + vulture + bandit)
        run: task check:all

  test:
    name: Tests (parallel + coverage ≥97%)
    runs-on: ubuntu-latest
    # The suite runs against SQLite (via the test fixtures), so no Postgres/Redis services are needed.
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: tests
      - name: Install go-task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - run: uv sync
      - name: Tests + coverage gate
        run: task test:coverage

  migrations:
    name: Atlas migration integrity (atlas.sum)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install go-task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      # Fails if a migration changed without `task atlas:hash` (tampered / out-of-date atlas.sum).
      - name: Verify atlas.sum
        run: task atlas:validate

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
      - name: Install go-task
        uses: arduino/setup-task@v3.0.0
        with:
          version: 3.x
      - name: Trivy scan (vuln + secret + misconfig)
        run: task trivy
