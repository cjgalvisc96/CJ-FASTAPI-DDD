name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate (lint, types, architecture, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Sync dependencies
        run: uv sync

      # Drive the same Taskfile targets developers run locally (task check:all minus the docker-based
      # trivy target, which runs in its own job below).
      - name: Lint (ruff)
        run: task check:linter

      - name: Types (pyright)
        run: task check:types

      - name: Architecture (import-linter)
        run: task check:architecture

      - name: Dead code (vulture)
        run: task check:deadcode

      - name: Tests (parallel, random, coverage >= 97%)
        run: task test:cov -- --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@0.3.1

      - name: Trivy filesystem scan (deps + secrets + config)
        run: task check:trivy
