name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate (lint, types, architecture, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Setup Task
        run: sh -c "$(curl -sSL https://taskfile.dev/install.sh)" -- -b /usr/local/bin v3.40.1

      - name: Sync dependencies
        run: uv sync

      # Drive the same Taskfile targets developers run locally (the docker/trivy scan runs in its own
      # job below).
      - name: Lint (ruff, incl. S/bandit security rules)
        run: task check:linter

      - name: Types (pyright)
        run: task check:types

      - name: Architecture (import-linter)
        run: task check:architecture

      - name: Dead code (vulture)
        run: task check:deadcode

      - name: SAST (bandit)
        run: task check:bandit

      - name: Tests (parallel, random, coverage >= 97%)
        run: task test:cov -- --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Task
        run: sh -c "$(curl -sSL https://taskfile.dev/install.sh)" -- -b /usr/local/bin v3.40.1

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.71.2
          trivy --version

      - name: Trivy filesystem scan (deps + secrets + config)
        run: task check:trivy
