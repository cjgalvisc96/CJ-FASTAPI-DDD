site_name: CJ FastAPI DDD
site_description: >-
  A simple DDD modular monolith — FastAPI, async Postgres, Keycloak RBAC, Redis cache.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Bounded Contexts: architecture/bounded-contexts.md
      - Layering: architecture/layering.md
      - Cross-Context Contracts: architecture/contracts.md
      - Persistence & CQRS: architecture/persistence.md
      - Auth & RBAC (Keycloak): architecture/auth-rbac.md
      - Caching (Redis): architecture/caching.md
      - Middleware: architecture/middleware.md
  - Development:
      - Setup: development/setup.md
      - Testing: development/testing.md
      - Governance: development/governance.md
  - Operations:
      - Docker Stack: operations/docker.md
      - Infrastructure (AWS): operations/infrastructure.md
      - CI: operations/ci.md
