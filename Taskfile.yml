version: "3"

silent: true

env:
  PYTHONPATH: src

vars:
  PY: uv run
  SRC: src/ddd_app
  COMPOSE: docker compose -f docker/docker-compose.yml
  # Host port is offset (5433) so this stack coexists with sibling projects; see docker-compose.yml.
  ATLAS_DB_URL: "postgres://ddd:ddd@localhost:15432/ddd?sslmode=disable"
  NETWORK: ddd-net
  ENV: '{{.ENV | default "dev"}}'   # target infra environment: dev | prod (override with ENV=prod)
  TG_DIR: "infra/terragrunt"

tasks:
  default:
    cmds:
      - task --list

  # --- Environment ---
  env:create:
    desc: Create venv, install deps, seed .env
    cmds:
      - uv venv
      - uv sync
      - "[ -f .env ] || cp .env.example .env"
      - echo "Env ready. Run 'task docker:up'."

  # --- Quality ---
  check:linter:
    desc: Ruff lint + format check
    cmds:
      - "{{.PY}} ruff check src tests"
      - "{{.PY}} ruff format --check src tests"

  check:types:
    desc: Pyright type check
    cmds:
      - "{{.PY}} pyright"

  check:architecture:
    desc: import-linter contracts
    cmds:
      - "{{.PY}} lint-imports"

  check:deadcode:
    desc: Vulture dead-code scan
    cmds:
      - "{{.PY}} vulture"

  bandit:
    desc: Python source security analysis (SAST)
    cmds:
      - "{{.PY}} bandit -c pyproject.toml -q -r src"

  trivy:
    desc: Scan the app for dependency CVEs, secrets, and Dockerfile misconfig (Trivy)
    cmds:
      # App-focused: skip infra/ — Terraform misconfig is gated separately by `task terragrunt:trivy`.
      - >
        trivy fs . --scanners vuln,secret,misconfig --severity HIGH,CRITICAL
        --ignore-unfixed --skip-dirs infra --exit-code 1 --quiet --skip-version-check

  fix:linter:
    desc: Ruff autofix + format
    cmds:
      - "{{.PY}} ruff check --fix src tests"
      - "{{.PY}} ruff format src tests"

  check:all:
    desc: Run every quality gate (lint, types, architecture, dead code, SAST)
    cmds:
      - task: check:linter
      - task: check:types
      - task: check:architecture
      - task: check:deadcode
      - task: bandit

  remove:cache:
    desc: Remove all tool caches and generated artifacts
    cmds:
      - >
        rm -rf .pytest_cache .ruff_cache .import_linter_cache .pyright .mypy_cache
        .coverage coverage.xml htmlcov .cache .venv
      - find . -type d -name __pycache__ -prune -exec rm -rf {} + 2>/dev/null || true
      - echo "Caches removed."

  # --- Tests --- (extra pytest args pass through, e.g. `task test:cov -- --cov-report=xml`)
  test:all:
    desc: Run all tests
    cmds:
      - "{{.PY}} pytest {{.CLI_ARGS}}"

  test:coverage:
    desc: Run tests with coverage report (gate >= 97%)
    cmds:
      - "{{.PY}} pytest --cov --cov-report=term-missing {{.CLI_ARGS}}"

  # --- Docker stack ---
  docker:up:
    desc: Bring up postgres + redis + keycloak + atlas(migrate) + lgtm(telemetry) + app, then tail the API logs
    cmds:
      - "{{.COMPOSE}} up -d --build"
      - echo "API → http://localhost:18000/docs   Keycloak → http://localhost:18080   Grafana → http://localhost:13000"
      - "{{.COMPOSE}} logs -f app"

  docker:down:
    desc: Tear down the stack (keep images)
    cmds:
      - "{{.COMPOSE}} down -v"

  docker:prune:
    desc: Remove everything (containers, volumes, images, network) — start from scratch
    cmds:
      - "{{.COMPOSE}} down -v --rmi local --remove-orphans"
      - "docker network rm {{.NETWORK}} 2>/dev/null || true"
      - echo "Pruned. Run 'task docker:up' to rebuild from scratch."

  docker:logs:
    desc: Tail the API logs
    cmds:
      - "{{.COMPOSE}} logs -f app"

  docker:smoke:
    desc: Curl health/docs
    cmds:
      - curl -fsS localhost:18000/health && echo OK

  # --- Migrations (Atlas via Docker) ---
  atlas:migrate:
    desc: Apply migrations to the running Postgres
    cmds:
      - >
        docker run --rm --network host -v {{.TASKFILE_DIR}}/migrations:/migrations
        arigaio/atlas:latest migrate apply
        --url "{{.ATLAS_DB_URL}}" --dir file:///migrations/versions

  atlas:status:
    desc: Show migration status
    cmds:
      - >
        docker run --rm --network host -v {{.TASKFILE_DIR}}/migrations:/migrations
        arigaio/atlas:latest migrate status
        --url "{{.ATLAS_DB_URL}}" --dir file:///migrations/versions

  atlas:hash:
    desc: Recompute atlas.sum
    cmds:
      - >
        docker run --rm -v {{.TASKFILE_DIR}}/migrations:/migrations
        arigaio/atlas:latest migrate hash --dir file:///migrations/versions

  atlas:validate:
    desc: Verify migrations/atlas.sum integrity (fails if a migration changed without re-hashing)
    cmds:
      - >
        docker run --rm -v {{.TASKFILE_DIR}}/migrations:/migrations
        arigaio/atlas:latest migrate validate --dir file:///migrations/versions

  # --- Seed ---
  seed:demo:
    desc: Seed demo users (idempotent)
    cmds:
      - "{{.PY}} ddd-seed"

  # --- floci (local AWS emulator for ENV=local) ---
  floci:up:
    desc: Start floci (local AWS) for `terragrunt:* ENV=local`
    cmds:
      - "{{.COMPOSE}} --profile infra up -d floci"
      - 'echo "floci is up at http://localhost:14566 — now run task terragrunt:apply ENV=local"'

  floci:down:
    desc: Stop floci
    cmds:
      - "{{.COMPOSE}} --profile infra stop floci"

  # --- Infra (Terragrunt Stacks, per ENV) ---
  # Usage: task terragrunt:plan ENV=dev  |  task terragrunt:apply ENV=prod  |  ...ENV=local (floci)
  # Each env is a Terragrunt Stack: `stack generate` materializes the units, then `stack run <cmd>`.
  terragrunt:fmt:
    desc: Format the Terraform/Terragrunt HCL
    cmds:
      - terraform fmt -recursive infra/terraform
      - cd {{.TG_DIR}} && terragrunt hcl fmt

  terragrunt:validate:
    desc: "Validate the Terragrunt stack for ENV (dev|prod|local)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate && terragrunt hcl validate

  terragrunt:init:
    desc: "Generate the stack + init (ENV=dev|prod|local)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate && terragrunt stack run init --non-interactive

  terragrunt:plan:
    desc: "Generate the stack + plan (ENV=dev|prod|local)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate && terragrunt stack run plan --non-interactive

  terragrunt:apply:
    desc: "Generate the stack + apply (ENV=dev|prod|local)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate && terragrunt stack run apply --non-interactive

  terragrunt:destroy:
    desc: "Generate the stack + destroy (ENV=dev|prod|local)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate && terragrunt stack run destroy --non-interactive

  terragrunt:trivy:
    desc: Trivy IaC misconfig scan of the Terraform (HIGH/CRITICAL, honors infra/.trivyignore)
    cmds:
      - >
        trivy config infra/terraform --severity HIGH,CRITICAL --ignorefile infra/.trivyignore
        --exit-code 1 --quiet --skip-version-check

  terragrunt:infracost:
    desc: "Infracost cost breakdown for ENV (needs INFRACOST_API_KEY)"
    cmds:
      - infracost breakdown --path {{.TG_DIR}}/{{.ENV}} --format table

  terragrunt:push-image:
    desc: "Build+push the app Lambda image to the api ECR repo (ENV=dev|prod; IMAGE_TAG env, default latest)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate
      - |
        set -euo pipefail
        TAG="${IMAGE_TAG:-latest}"
        cd {{.TG_DIR}}/{{.ENV}}/.terragrunt-stack/ecr
        # Bootstrap-safe: ensure the repo exists before the first full apply needs the image.
        terragrunt apply -auto-approve --non-interactive >/dev/null
        REPO=$(terragrunt output -raw repository_url)
        REGISTRY="${REPO%%/*}"
        echo "→ building + pushing app Lambda image to $REPO:$TAG"
        aws ecr get-login-password | docker login --username AWS --password-stdin "$REGISTRY"
        docker build -f {{.TASKFILE_DIR}}/Dockerfile --target lambda -t "$REPO:$TAG" {{.TASKFILE_DIR}}
        docker push "$REPO:$TAG"

  terragrunt:migrate:
    desc: "Build+push the migrate image and run the Fargate Atlas task (ENV=dev|prod; needs AWS creds + applied infra)"
    cmds:
      - cd {{.TG_DIR}}/{{.ENV}} && terragrunt stack generate
      - |
        set -euo pipefail
        cd {{.TG_DIR}}/{{.ENV}}/.terragrunt-stack/migrate
        REPO=$(terragrunt output -raw repository_url)
        CLUSTER=$(terragrunt output -raw cluster_name)
        TASKDEF=$(terragrunt output -raw task_definition_family)
        SG=$(terragrunt output -raw security_group_id)
        SUBNETS=$(terragrunt output -json subnet_ids | jq -r 'join(",")')
        REGISTRY="${REPO%%/*}"
        echo "→ building + pushing migrate image to $REPO:latest"
        aws ecr get-login-password | docker login --username AWS --password-stdin "$REGISTRY"
        docker build -f {{.TASKFILE_DIR}}/Dockerfile.migrate -t "$REPO:latest" {{.TASKFILE_DIR}}
        docker push "$REPO:latest"
        echo "→ running one-off Fargate migrate task"
        TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASKDEF" --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
          --query 'tasks[0].taskArn' --output text)
        echo "  task: $TASK_ARN — waiting for it to stop…"
        aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
        CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
          --query 'tasks[0].containers[0].exitCode' --output text)
        echo "  migrate exit code: $CODE"
        test "$CODE" = "0"

  # --- Docs (MkDocs Material) ---
  docs:serve:
    desc: Serve the docs site at http://127.0.0.1:8002
    cmds:
      - "{{.PY}} --group docs mkdocs serve -a 127.0.0.1:8002"

  docs:build:
    desc: Build the static docs site
    cmds:
      - "{{.PY}} --group docs mkdocs build --strict"

  # --- Run API locally (needs postgres+redis reachable) ---
  api:
    desc: Run the API with reload
    env:
      API_RELOAD: "1"
    cmds:
      - "{{.PY}} ddd-api"
