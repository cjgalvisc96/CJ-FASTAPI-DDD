name: cj-fastapi-ddd

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-ddd}
      POSTGRES_USER: ${DB_USER:-ddd}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ddd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ddd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ddd}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - ddd-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - ddd-net
    healthcheck:
      test:
        ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok >&3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot Atlas migration; the app waits for it to complete before starting.
  atlas:
    image: arigaio/atlas:latest
    command: >
      migrate apply
      --url "postgres://ddd:ddd@postgres:5432/ddd?sslmode=disable"
      --dir "file:///migrations/versions"
    volumes:
      - ../migrations:/migrations:ro
    networks:
      - ddd-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    image: local/cj-fastapi-ddd:dev
    command: sh -c "ddd-seed && ddd-api"
    # All app config comes from .env; the values below only override the service hostnames so the app
    # reaches the sibling containers by name. (For host-based runs, .env already points at localhost.)
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:ro
    networks:
      - ddd-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      atlas:
        condition: service_completed_successfully

  # Local AWS emulator for exercising the Terraform/Terragrunt stack offline.
  # Start on demand (docker compose --profile infra up -d floci, or task floci:up); target it with
  # task terragrunt:plan ENV=local.
  floci:
    image: floci/floci:latest
    profiles: ["infra"]
    environment:
      FLOCI_HOSTNAME: floci
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # floci spawns backing containers
      - flocidata:/var/lib/floci
    networks:
      - ddd-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/4566 && echo ok >&3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

networks:
  ddd-net:
    name: ddd-net
    driver: bridge

volumes:
  pgdata:
  flocidata:
